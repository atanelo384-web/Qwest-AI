<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Qesty AI — минималистичный чат</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDbeswCHq8Lg7Dnz9oYSgZeIqQ8azcEC-s",
            authDomain: "qesty-ai.firebaseapp.com",
            projectId: "qesty-ai",
            storageBucket: "qesty-ai.firebasestorage.app",
            messagingSenderId: "125275289686",
            appId: "1:125275289686:web:5410de4bc789775b8063f7",
            measurementId: "G-68ZKJQ3D0H"
        };

        // API ключ OpenRouter
        const OPENROUTER_API_KEY = "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";

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        // DOM элементы
        const loginScreen = document.getElementById('loginScreen');
        const appContainer = document.getElementById('appContainer');
        const userAvatar = document.getElementById('userAvatar');
        const userNameSpan = document.getElementById('userName');
        const logoutBtn = document.getElementById('logoutBtn');
        const historyList = document.getElementById('historyList');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        let currentUserId = null;
        let currentChatId = null;
        let currentMessages = [];

        // === АВТОРИЗАЦИЯ ===
        window.handleGoogleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert("Ошибка входа: " + error.message);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                loginScreen.classList.add('hidden');
                appContainer.classList.remove('hidden');
                userAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?background=random&name=' + user.displayName;
                userNameSpan.textContent = user.displayName || user.email;
                await initUserData();
                loadLastChat();
            } else {
                loginScreen.classList.remove('hidden');
                appContainer.classList.add('hidden');
                currentUserId = null;
            }
        });

        logoutBtn.onclick = () => signOut(auth);

        // === РАБОТА С БАЗОЙ ===
        async function initUserData() {
    const userRef = doc(db, "users", currentUserId);
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) {
        await setDoc(userRef, { 
            chats: [],
            email: currentUserId,
            createdAt: new Date().toISOString()
        });
        console.log("✅ Новый пользователь создан:", currentUserId);
    } else {
        console.log("✅ Пользователь найден:", currentUserId);
    }
    listenHistory();
}

        function listenHistory() {
            const userRef = doc(db, "users", currentUserId);
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    renderHistory(docSnap.data().chats || []);
                }
            });
        }

        function renderHistory(chats) {
            if (!historyList) return;
            historyList.innerHTML = '';
            if (chats.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-history';
                empty.innerText = 'Нет диалогов';
                historyList.appendChild(empty);
                return;
            }
            chats.slice().reverse().forEach(chat => {
                const chatDiv = document.createElement('div');
                chatDiv.className = `history-item ${currentChatId === chat.id ? 'active' : ''}`;
                chatDiv.innerHTML = `<i class="far fa-comment"></i><span>${escapeHtml(chat.title || 'Новый чат')}</span>`;
                chatDiv.onclick = () => loadChat(chat.id);
                historyList.appendChild(chatDiv);
            });
        }

        async function createNewChat() {
            if (!currentUserId) return;
            const newId = Date.now().toString();
            const newChat = {
                id: newId,
                title: 'Новый диалог',
                createdAt: new Date().toISOString(),
                messages: []
            };
            const userRef = doc(db, "users", currentUserId);
            await updateDoc(userRef, { chats: arrayUnion(newChat) });
            loadChat(newId);
        }

        async function loadChat(chatId) {
            currentChatId = chatId;
            const userRef = doc(db, "users", currentUserId);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                const chat = userSnap.data().chats?.find(c => c.id === chatId);
                if (chat) {
                    currentMessages = chat.messages || [];
                    renderMessages();
                    renderHistory(userSnap.data().chats || []);
                }
            }
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        async function loadLastChat() {
            const userRef = doc(db, "users", currentUserId);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                const chats = userSnap.data().chats || [];
                if (chats.length > 0) {
                    loadChat(chats[chats.length - 1].id);
                } else {
                    await createNewChat();
                }
            }
        }

        newChatBtn.onclick = () => createNewChat();

        function renderMessages() {
            if (!chatArea) return;
            chatArea.innerHTML = '';
            if (!currentMessages.length) {
                const placeholder = document.createElement('div');
                placeholder.className = 'empty-chat';
                placeholder.innerHTML = '<i class="fas fa-robot"></i><p>Напишите Qesty что-нибудь...</p>';
                chatArea.appendChild(placeholder);
                return;
            }
            currentMessages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
                msgDiv.innerHTML = `
                    <div class="message-bubble">
                        <strong>${msg.role === 'user' ? 'Вы' : 'Qesty AI'}</strong>
                        <p>${escapeHtml(msg.text)}</p>
                    </div>
                `;
                chatArea.appendChild(msgDiv);
            });
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // === ОТПРАВКА СООБЩЕНИЯ В OPENROUTER (Llama 3.3 70B) ===
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUserId || !currentChatId) return;

            const userMessage = { role: 'user', text, timestamp: Date.now() };
            currentMessages.push(userMessage);
            await saveMessagesToFirestore();
            renderMessages();

            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;
            typingIndicator.classList.remove('hidden');

            try {
                const aiReply = await callOpenRouter(currentMessages);
                const aiMessage = { role: 'ai', text: aiReply, timestamp: Date.now() };
                currentMessages.push(aiMessage);
                await saveMessagesToFirestore();
                renderMessages();

                if (currentMessages.length === 2) {
                    const title = text.length > 30 ? text.slice(0,30)+'…' : text;
                    await updateChatTitle(currentChatId, title);
                }
            } catch (err) {
                console.error(err);
                const errorMsg = { role: 'ai', text: '❌ Ошибка: ' + err.message, timestamp: Date.now() };
                currentMessages.push(errorMsg);
                await saveMessagesToFirestore();
                renderMessages();
            } finally {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                typingIndicator.classList.add('hidden');
                messageInput.focus();
            }
        }

        // Функция вызова OpenRouter API
        async function callOpenRouter(messages) {
            const apiMessages = messages.slice(-20).map(m => ({
                role: m.role === 'user' ? 'user' : 'assistant',
                content: m.text
            }));

            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENROUTER_API_KEY}`
                },
                body: JSON.stringify({
                    model: "meta-llama/llama-3.3-70b-instruct:free",
                    messages: apiMessages,
                    temperature: 0.7,
                    max_tokens: 2048
                })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.choices[0].message.content;
        }

        async function saveMessagesToFirestore() {
            const userRef = doc(db, "users", currentUserId);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                const chats = userSnap.data().chats || [];
                const updatedChats = chats.map(chat => {
                    if (chat.id === currentChatId) {
                        return { ...chat, messages: currentMessages };
                    }
                    return chat;
                });
                await updateDoc(userRef, { chats: updatedChats });
            }
        }

        async function updateChatTitle(chatId, newTitle) {
            const userRef = doc(db, "users", currentUserId);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                const chats = userSnap.data().chats || [];
                const updatedChats = chats.map(chat => {
                    if (chat.id === chatId) {
                        return { ...chat, title: newTitle };
                    }
                    return chat;
                });
                await updateDoc(userRef, { chats: updatedChats });
                listenHistory();
            }
        }

        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f7f9fc;
            height: 100vh;
            overflow: hidden;
            color: #1e2a3a;
        }
        .login-card {
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        .login-card i { font-size: 3.5rem; color: #6366f1; margin-bottom: 1rem; }
        .login-card h1 { font-weight: 500; font-size: 2rem; margin-bottom: 0.5rem; }
        .login-card p { color: #5b6e8c; margin-bottom: 2rem; }
        .google-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.8rem 1.8rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #1e293b;
        }
        .google-btn:hover { background: #f8fafc; border-color: #cbd5e1; transform: scale(0.98); }
        .app-layout { display: flex; height: 100vh; background: #ffffff; }
        .sidebar {
            width: 280px;
            background: #fefefe;
            border-right: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #eef2f6;
            margin-bottom: 1.5rem;
        }
        .logo-area h2 {
            font-weight: 500;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-area p { font-size: 0.7rem; color: #7c8ba0; }
        .new-chat-btn {
            background: #4f46e5;
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #6366f1; transform: rotate(90deg); }
        .history-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #94a3b8;
            margin: 0.5rem 0 1rem;
        }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.7rem 1rem;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #334155;
        }
        .history-item i { width: 20px; color: #818cf8; }
        .history-item:hover { background: #f1f5f9; }
        .history-item.active { background: #eef2ff; color: #4f46e5; font-weight: 500; }
        .empty-history { text-align: center; color: #cbd5e1; font-size: 0.8rem; padding: 1rem; }
        .user-info {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #edf2f7;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .user-info span { font-size: 0.85rem; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .logout-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 1.1rem; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #ffffff; }
        .chat-header { padding: 1rem 2rem; border-bottom: 1px solid #f0f2f5; }
        .chat-header h3 { font-weight: 450; font-size: 1rem; color: #2d3a4b; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 2rem; scroll-behavior: smooth; }
        .message { margin-bottom: 1.2rem; display: flex; }
        .message.user { justify-content: flex-end; }
        .message-bubble {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 1.8rem;
            background: #f1f5f9;
            color: #1e293b;
            font-size: 0.95rem;
            line-height: 1.45;
        }
        .message.user .message-bubble { background: #4f46e5; color: white; border-bottom-right-radius: 0.3rem; }
        .message.ai .message-bubble { background: #f8fafc; border: 1px solid #eef2ff; border-bottom-left-radius: 0.3rem; }
        .message-bubble strong { font-size: 0.75rem; font-weight: 600; opacity: 0.7; display: block; margin-bottom: 4px; }
        .empty-chat { text-align: center; padding: 3rem; color: #a0afc0; }
        .empty-chat i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .input-area { padding: 1rem 2rem 1.8rem; background: white; border-top: 1px solid #f0f2f5; }
        .input-wrapper {
            display: flex;
            gap: 12px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 3rem;
            padding: 0.4rem 0.4rem 0.4rem 1.5rem;
            transition: all 0.2s ease;
        }
        .input-wrapper:hover { border-color: #a5b4fc; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .input-wrapper:focus-within { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2); }
        textarea {
            flex: 1;
            border: none;
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 0.7rem 0;
            background: transparent;
            outline: none;
            max-height: 120px;
        }
        .send-btn {
            background: #4f46e5;
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.15s;
        }
        .send-btn:hover { background: #6366f1; transform: scale(0.96); }
        .typing-indicator { font-size: 0.75rem; color: #94a3b8; padding: 0.2rem 1.5rem; }
        .hidden { display: none; }
        @media (max-width: 640px) {
            .sidebar { width: 70px; padding: 1rem 0.5rem; }
            .logo-area p, .history-item span, .user-info span, .history-title { display: none; }
            .history-item i { margin: 0 auto; }
            .new-chat-btn { margin: 0 auto; }
            .user-info img { margin: 0 auto; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div id="loginScreen" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f7f9fc;">
        <div class="login-card">
            <i class="fas fa-brain"></i>
            <h1>Qesty AI</h1>
            <p>войдите через Google, чтобы начать</p>
            <button class="google-btn" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i> Войти с Google
            </button>
        </div>
    </div>

    <div id="appContainer" class="app-layout hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <h2>Qesty AI</h2>
                    <p>open router</p>
                </div>
                <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
            </div>
            <div class="history-title">ИСТОРИЯ</div>
            <div class="history-list" id="historyList"></div>
            <div class="user-info">
                <img id="userAvatar" src="" alt="avatar">
                <span id="userName"></span>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <main class="main-chat">
            <div class="chat-header">
                <h3><i class="far fa-comment-dots"></i> Диалог с Qesty</h3>
            </div>
            <div class="chat-messages" id="chatArea"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" rows="1" placeholder="Напишите что-нибудь..." disabled></textarea>
                    <button class="send-btn" id="sendBtn" disabled><i class="fas fa-paper-plane"></i></button>
                </div>
                <div id="typingIndicator" class="typing-indicator hidden">Qesty печатает...</div>
            </div>
        </main>
    </div>
</body>
</html>
